<!DOCTYPE html>

<html>
    <head>
        <title>Performance Task 1</title>
        <script src="http://code.jquery.com/jquery-1.5.min.js"></script>
    </head>
    <style>
        body {
        background: #f6f5f7;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: 'Verdana', sans-serif;
        height: 100vh;
        margin: -20px 0 50px;
        }
        h1{
            font-weight: bold;
	        margin: 0;
        }
        h2 {
        text-align: center;
        color:rgb(104, 90, 90);
        font-family: Verdana, Helvetica, sans-serif;;
        }
        textarea {
        width: 100%;
        height: 150px;
        padding: 12px 20px;
        box-sizing: border-box;
        border: 2px solid #ccc;
        border-radius: 4px;
        background-color: #f8f8f8;
        }
        * {
        box-sizing: border-box;
        }

        input[type=text] textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: vertical;
        }
        input[type=text]:focus, input[type=textarea]:focus {
        background-color: #ddd;
        outline: none;
        }
        button {
        border-radius: 30px;
        border: 1px solid #FF4B2B;
        background-color: #FF4B2B;
        color: #FFFFFF;
        font-size: 12px;
        font-weight: bold;
        padding: 12px 55px;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: transform 80ms ease-in;
        }
        button:hover {
        opacity:1;
        }
        form {
        background-color: #FFFFFF;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 50px;
        height: 100%;
        text-align: center;
        }
            
        hr {
        border: 1px solid #f1f1f1;
        margin-bottom: 25px;
        }

        label {
        padding: 12px 12px 12px 0;
        display: inline-block;
        }
        
       </style>
<form>
<h1>Performance Task 1 and Exam</h1>
<center>
<p>the main structuring patterns of GUI software architecture<br></p>
<p>(the view tree, listeners, and model-view-controller using HTML, JavaScript, and jQuery.)</p>
</center>
<body> 
        
    <div id="msg">
        <div class="container">
            <h2>What are you doing now?</h2>
            <hr>
            <label>Name :</label>
            <input type="text" id="name" placeholder="Please Enter your Name..."><br><br>

            <label>Date : </label>
            <input type="date" id="date"><br><br>

            <label>Message :</label>
            <textarea id="txtArea" placeholder="Please Enter your Message..."></textarea><br><br>

            <button id="btn">Send Message</button>
        </div>
    </div>
    </form>
    </body>
    <script>
        $(document).ready(function () {
            $("#btn").click(function () {
                var name = $("#name").val();
                var date = $("#date").val();
                var txt = $("#txtArea").val();
                console.log(name, date, txt);
                $("#msg").html("<b>Name :</b> " +  name + "<b>Date :</b> " +  date + 
                "<b>Sent Message Appear Here : </b> ").css("border", "5px double violet");
                $("#msg").append(txt);                
            });
        });
    </script>
</html>
